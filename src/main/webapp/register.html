<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KP Travels – Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #071739 0%, #0a2a6e 50%, #0d3b8e 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative; padding: 20px 0;
        }
        .particles span {
            position: absolute; display: block; border-radius: 50%;
            background: rgba(0,198,255,0.15); animation: floatUp 7s infinite ease-in-out;
        }
        .particles span:nth-child(1){width:16px;height:16px;left:8%;animation-delay:0s;animation-duration:6s;}
        .particles span:nth-child(2){width:24px;height:24px;left:20%;animation-delay:1s;animation-duration:8s;}
        .particles span:nth-child(3){width:12px;height:12px;left:40%;animation-delay:2s;animation-duration:5s;}
        .particles span:nth-child(4){width:20px;height:20px;left:60%;animation-delay:0.5s;animation-duration:7s;}
        .particles span:nth-child(5){width:14px;height:14px;left:88%;animation-delay:3s;animation-duration:6s;}
        @keyframes floatUp {
            0%{bottom:-20px;opacity:0;} 20%{opacity:0.6;} 80%{opacity:0.3;} 100%{bottom:110%;opacity:0;}
        }
        .card {
            position: relative; z-index: 10; width: 440px;
            background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 24px;
            padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
        }
        .logo { font-family:'Poppins',sans-serif; font-size:28px; font-weight:800; color:white; margin-bottom:4px; }
        .logo span { color:#00c6ff; }
        .subtitle { color:rgba(255,255,255,0.55); font-size:13px; letter-spacing:1px; margin-bottom:28px; }
        .msg-box { border-radius:10px; padding:10px; font-size:14px; margin-bottom:14px; display:none; }
        .msg-success { background:rgba(0,198,255,0.15); border:1px solid rgba(0,198,255,0.3); color:#00c6ff; }
        .msg-error   { background:rgba(255,65,108,0.15); border:1px solid rgba(255,65,108,0.3); color:#ff8a8a; animation:shake 0.4s ease; }
        .msg-warn    { background:rgba(255,230,109,0.15); border:1px solid rgba(255,230,109,0.3); color:#ffe66d; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
        .input-group { position:relative; margin-bottom:14px; text-align:left; }
        .input-group i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.5); font-size:14px; }
        .input-group input {
            width:100%; padding:12px 14px 12px 42px;
            background:rgba(255,255,255,0.10); border:1.5px solid rgba(255,255,255,0.15);
            border-radius:12px; color:white; font-size:15px; font-family:'Inter',sans-serif; outline:none;
            transition:border 0.2s, background 0.2s;
        }
        .input-group input::placeholder { color:rgba(255,255,255,0.45); }
        .input-group input:focus { border-color:#00c6ff; background:rgba(255,255,255,0.15); }
        .btn-register {
            width:100%; padding:13px; margin-top:8px;
            background:linear-gradient(135deg,#00c6ff,#0072ff);
            color:white; border:none; border-radius:12px;
            font-size:16px; font-weight:700; font-family:'Poppins',sans-serif;
            cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
        }
        .btn-register:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,114,255,0.4); }
        .login-note { margin-top:18px; color:rgba(255,255,255,0.6); font-size:14px; }
        .login-note a { color:#ffe66d; text-decoration:none; font-weight:600; }
        .login-note a:hover { color:white; }
        .footer-text { margin-top:20px; color:rgba(255,255,255,0.3); font-size:12px; letter-spacing:1px; }
        @media(max-width:480px){ .card{width:92%;padding:28px 20px;} }
    </style>
</head>
<body>
<div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
</div>
<div class="card">
    <div class="logo"><i class="fas fa-paper-plane"></i> KP <span>Travels</span></div>
    <p class="subtitle">Create your account to get started</p>
    <div id="registerMessage" class="msg-box"></div>
    <form action="RegisterServlet" method="post">
        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="text" name="fullname" placeholder="Full Name" required>
        </div>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="userid" placeholder="Create User ID" required>
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Create Password" required>
        </div>
        <div class="input-group">
            <i class="fas fa-shield-alt"></i>
            <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
        </div>
        <button type="submit" class="btn-register"><i class="fas fa-user-plus"></i> Register</button>
    </form>
    <p class="login-note">Already Registered? <a href="index.html">Login Here</a></p>
    <div class="footer-text">Start Your Journey with KP Travels</div>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");
    const el = document.getElementById("registerMessage");
    const messages = {
        error:    ["msg-error",   "<i class='fas fa-times-circle'></i> Registration Failed! Try again."],
        password: ["msg-error",   "<i class='fas fa-times-circle'></i> Passwords do not match!"],
        exists:   ["msg-warn",    "<i class='fas fa-exclamation-circle'></i> User ID already exists! Try another."],
        empty:    ["msg-error",   "<i class='fas fa-times-circle'></i> Please fill all fields!"],
        success:  ["msg-success", "<i class='fas fa-check-circle'></i> Registration Successful! Redirecting..."]
    };
    if (msg && messages[msg]) {
        el.classList.add("msg-box", messages[msg][0]);
        el.innerHTML = messages[msg][1];
        el.style.display = "block";
        if (msg === "success") setTimeout(() => window.location.href = "index.html", 2000);
    }
</script>
</body>
</html>
