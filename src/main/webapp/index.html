<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KP Travels – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #071739 0%, #0a2a6e 50%, #0d3b8e 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .particles span {
            position: absolute; display: block; border-radius: 50%;
            background: rgba(0,198,255,0.15);
            animation: floatUp 7s infinite ease-in-out;
        }
        .particles span:nth-child(1){width:16px;height:16px;left:8%;animation-delay:0s;animation-duration:6s;}
        .particles span:nth-child(2){width:24px;height:24px;left:20%;animation-delay:1s;animation-duration:8s;}
        .particles span:nth-child(3){width:12px;height:12px;left:40%;animation-delay:2s;animation-duration:5s;}
        .particles span:nth-child(4){width:20px;height:20px;left:60%;animation-delay:0.5s;animation-duration:7s;}
        .particles span:nth-child(5){width:28px;height:28px;left:75%;animation-delay:1.5s;animation-duration:9s;}
        .particles span:nth-child(6){width:14px;height:14px;left:88%;animation-delay:3s;animation-duration:6s;}
        @keyframes floatUp {
            0%{bottom:-20px;opacity:0;} 20%{opacity:0.6;} 80%{opacity:0.3;} 100%{bottom:110%;opacity:0;}
        }
        .card {
            position: relative; z-index: 10; width: 420px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px; padding: 44px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
        }
        .logo { font-family:'Poppins',sans-serif; font-size:30px; font-weight:800; color:white; margin-bottom:4px; }
        .logo span { color:#00c6ff; }
        .tagline { color:rgba(255,255,255,0.55); font-size:13px; letter-spacing:2px; text-transform:uppercase; margin-bottom:32px; }
        .success-msg {
            background:rgba(0,198,255,0.15); border:1px solid rgba(0,198,255,0.3);
            color:#00c6ff; border-radius:10px; padding:10px; font-size:14px; margin-bottom:16px; display:none;
        }
        .input-group { position:relative; margin-bottom:16px; text-align:left; }
        .input-group i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.5); font-size:15px; }
        .input-group input {
            width:100%; padding:13px 14px 13px 42px;
            background:rgba(255,255,255,0.10); border:1.5px solid rgba(255,255,255,0.15);
            border-radius:12px; color:white; font-size:15px; font-family:'Inter',sans-serif; outline:none;
            transition:border 0.2s, background 0.2s;
        }
        .input-group input::placeholder { color:rgba(255,255,255,0.45); }
        .input-group input:focus { border-color:#00c6ff; background:rgba(255,255,255,0.15); }
        .btn-login {
            width:100%; padding:14px; margin-top:8px;
            background:linear-gradient(135deg,#00c6ff,#0072ff);
            color:white; border:none; border-radius:12px;
            font-size:16px; font-weight:700; font-family:'Poppins',sans-serif;
            cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
        }
        .btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,114,255,0.4); }
        .register-note { margin-top:20px; color:rgba(255,255,255,0.6); font-size:14px; }
        .register-note a { color:#ffe66d; text-decoration:none; font-weight:600; }
        .register-note a:hover { color:white; }
        .footer-text { margin-top:24px; color:rgba(255,255,255,0.3); font-size:12px; letter-spacing:1px; }
        @media(max-width:480px){ .card{width:92%;padding:32px 24px;} }
        .error-style {
	    background: rgba(255,65,108,0.15) !important;
	    border: 1px solid rgba(255,65,108,0.3) !important;
	    color: #ff8a8a !important;
}
    </style>
</head>
<body>
<div class="particles">
    <span></span><span></span><span></span><span></span><span></span><span></span>
</div>
<div class="card">
    <div class="logo"><i class="fas fa-paper-plane"></i> KP <span>Travels</span></div>
    <p class="tagline">Your Journey Begins Here</p>
    <div id="successMessage" class="success-msg"></div>
    <form action="LoginServlet" method="post">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="userid" placeholder="Enter User ID" required>
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Login</button>
    </form>
    <p style="text-align:center; margin-top:14px;">
    <a href="forgot-password.html" style="color:#ffe66d; text-decoration:none; font-size:14px; font-weight:600;">
        Forgot Password?
    </a>
</p>
    <p class="register-note">New User? <a href="register.html">Register Here</a></p>
    <div class="footer-text">• Safe &nbsp;•&nbsp; Secure &nbsp;•&nbsp; Smart Booking</div>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");
    const el = document.getElementById("successMessage");

    if (msg === "success") {
        el.style.display = "block";
        el.className = "success-msg";
        el.innerHTML = "<i class='fas fa-check-circle'></i> Registration Successful! Please Login.";
    }
    else if (msg === "notfound") {
        el.style.display = "block";
        el.className = "success-msg error-style";
        el.innerHTML = "<i class='fas fa-exclamation-circle'></i> User not found! Please register first.";
    }
    else if (msg === "wrongpass") {
        el.style.display = "block";
        el.className = "success-msg error-style";
        el.innerHTML = "<i class='fas fa-times-circle'></i> Incorrect password! Please try again.";
    }
    else if (msg === "resetsuccess") {
        el.style.display = "block";
        el.innerHTML = "<i class='fas fa-check-circle'></i> Password reset successful! Please login with your new password.";
    }
</script>
</body>
</html>
