<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KP Travels – Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #071739 0%, #0a2a6e 50%, #0d3b8e 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .particles span {
            position: absolute; display: block; border-radius: 50%;
            background: rgba(0,198,255,0.15); animation: floatUp 7s infinite ease-in-out;
        }
        .particles span:nth-child(1){width:16px;height:16px;left:8%;animation-delay:0s;animation-duration:6s;}
        .particles span:nth-child(2){width:24px;height:24px;left:20%;animation-delay:1s;animation-duration:8s;}
        .particles span:nth-child(3){width:12px;height:12px;left:40%;animation-delay:2s;animation-duration:5s;}
        @keyframes floatUp { 0%{bottom:-20px;opacity:0;} 20%{opacity:0.6;} 80%{opacity:0.3;} 100%{bottom:110%;opacity:0;} }

        .card {
            position: relative; z-index: 10; width: 420px;
            background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 24px;
            padding: 44px 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
        }
        .icon-box {
            width:64px; height:64px; background:rgba(0,166,81,0.15);
            border:1px solid rgba(0,166,81,0.3); border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 20px; font-size:26px; color:#00a651;
        }
        .logo { font-family:'Poppins',sans-serif; font-size:24px; font-weight:800; color:white; margin-bottom:8px; }
        .subtitle { color:rgba(255,255,255,0.6); font-size:14px; margin-bottom:28px; }

        .msg-box { border-radius:10px; padding:10px; font-size:14px; margin-bottom:16px; display:none; }
        .msg-error { background:rgba(255,65,108,0.15); border:1px solid rgba(255,65,108,0.3); color:#ff8a8a; }

        .input-group { position:relative; margin-bottom:18px; text-align:left; }
        .input-group i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.5); font-size:15px; }
        .input-group input {
            width:100%; padding:13px 14px 13px 42px;
            background:rgba(255,255,255,0.10); border:1.5px solid rgba(255,255,255,0.15);
            border-radius:12px; color:white; font-size:15px; font-family:'Inter',sans-serif; outline:none;
            transition:border 0.2s, background 0.2s;
        }
        .input-group input::placeholder { color:rgba(255,255,255,0.45); }
        .input-group input:focus { border-color:#00c6ff; background:rgba(255,255,255,0.15); }

        .btn-reset {
            width:100%; padding:14px; background:linear-gradient(135deg,#00a651,#007a3d);
            color:white; border:none; border-radius:12px; font-size:16px; font-weight:700;
            font-family:'Poppins',sans-serif; cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
        }
        .btn-reset:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,166,81,0.4); }

        @media(max-width:480px){ .card{width:92%;padding:32px 24px;} }
    </style>
</head>
<body>
<div class="particles"><span></span><span></span><span></span></div>
<div class="card">
    <div class="icon-box"><i class="fas fa-lock-open"></i></div>
    <div class="logo">Set New Password</div>
    <p class="subtitle">Create a new password for your account.</p>

    <div id="errorMessage" class="msg-box msg-error"></div>

    <form action="ResetPasswordServlet" method="post" onsubmit="return validateForm()">
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="newPassword" id="newPassword" placeholder="New Password" required minlength="6">
        </div>
        <div class="input-group">
            <i class="fas fa-shield-alt"></i>
            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm New Password" required minlength="6">
        </div>
        <button type="submit" class="btn-reset"><i class="fas fa-check"></i> Reset Password</button>
    </form>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");
    const el = document.getElementById("errorMessage");
    if (msg === "mismatch") {
        el.style.display = "block";
        el.innerHTML = "<i class='fas fa-times-circle'></i> Passwords do not match. Please try again.";
    }

    function validateForm() {
        const pass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (pass !== confirm) {
            alert('Passwords do not match!');
            return false;
        }
        return true;
    }
</script>
</body>
</html>
