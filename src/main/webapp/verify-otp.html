<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KP Travels – Verify OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #071739 0%, #0a2a6e 50%, #0d3b8e 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .particles span {
            position: absolute; display: block; border-radius: 50%;
            background: rgba(0,198,255,0.15); animation: floatUp 7s infinite ease-in-out;
        }
        .particles span:nth-child(1){width:16px;height:16px;left:8%;animation-delay:0s;animation-duration:6s;}
        .particles span:nth-child(2){width:24px;height:24px;left:20%;animation-delay:1s;animation-duration:8s;}
        .particles span:nth-child(3){width:12px;height:12px;left:40%;animation-delay:2s;animation-duration:5s;}
        .particles span:nth-child(4){width:20px;height:20px;left:60%;animation-delay:0.5s;animation-duration:7s;}
        @keyframes floatUp { 0%{bottom:-20px;opacity:0;} 20%{opacity:0.6;} 80%{opacity:0.3;} 100%{bottom:110%;opacity:0;} }

        .card {
            position: relative; z-index: 10; width: 420px;
            background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 24px;
            padding: 44px 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
        }
        .icon-box {
            width:64px; height:64px; background:rgba(0,198,255,0.15);
            border:1px solid rgba(0,198,255,0.3); border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 20px; font-size:26px; color:#00c6ff;
        }
        .logo { font-family:'Poppins',sans-serif; font-size:24px; font-weight:800; color:white; margin-bottom:8px; }
        .subtitle { color:rgba(255,255,255,0.6); font-size:14px; margin-bottom:28px; line-height:1.6; }

        .msg-box { border-radius:10px; padding:10px; font-size:14px; margin-bottom:16px; display:none; }
        .msg-success { background:rgba(0,198,255,0.15); border:1px solid rgba(0,198,255,0.3); color:#00c6ff; }
        .msg-error   { background:rgba(255,65,108,0.15); border:1px solid rgba(255,65,108,0.3); color:#ff8a8a; }

        .otp-group { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
        .otp-group input {
            width:48px; height:56px; text-align:center; font-size:22px; font-weight:700;
            background:rgba(255,255,255,0.10); border:1.5px solid rgba(255,255,255,0.15);
            border-radius:12px; color:white; outline:none; transition:border 0.2s;
            font-family:'Poppins',sans-serif;
        }
        .otp-group input:focus { border-color:#00c6ff; background:rgba(255,255,255,0.15); }

        .btn-verify {
            width:100%; padding:14px; background:linear-gradient(135deg,#00c6ff,#0072ff);
            color:white; border:none; border-radius:12px; font-size:16px; font-weight:700;
            font-family:'Poppins',sans-serif; cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
        }
        .btn-verify:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,114,255,0.4); }

        .resend-link { margin-top:18px; color:rgba(255,255,255,0.6); font-size:14px; }
        .resend-link a { color:#ffe66d; text-decoration:none; font-weight:600; }
        .resend-link a:hover { color:white; }

        .back-link { margin-top:14px; color:rgba(255,255,255,0.5); font-size:13px; }
        .back-link a { color:#00c6ff; text-decoration:none; }

        @media(max-width:480px){ .card{width:92%;padding:32px 24px;} .otp-group input{width:40px;height:48px;font-size:18px;} }
    </style>
</head>
<body>
<div class="particles"><span></span><span></span><span></span><span></span></div>
<div class="card">
    <div class="icon-box"><i class="fas fa-shield-alt"></i></div>
    <div class="logo">Verify OTP</div>
    <p class="subtitle">We've sent a 6-digit OTP to your registered email. Enter it below to continue.</p>

    <div id="statusMessage" class="msg-box"></div>

    <form action="VerifyOtpServlet" method="post" id="otpForm">
        <div class="otp-group">
            <input type="text" maxlength="1" class="otp-input" required>
            <input type="text" maxlength="1" class="otp-input" required>
            <input type="text" maxlength="1" class="otp-input" required>
            <input type="text" maxlength="1" class="otp-input" required>
            <input type="text" maxlength="1" class="otp-input" required>
            <input type="text" maxlength="1" class="otp-input" required>
        </div>
        <input type="hidden" name="otp" id="otpHidden">
        <button type="submit" class="btn-verify"><i class="fas fa-check-circle"></i> Verify OTP</button>
    </form>

    <p class="resend-link">Didn't receive code? <a href="forgot-password.html">Resend OTP</a></p>
    <p class="back-link"><a href="index.html">Back to Login</a></p>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");
    const el = document.getElementById("statusMessage");
    if (msg === "sent") {
        el.style.display = "block";
        el.className = "msg-box msg-success";
        el.innerHTML = "<i class='fas fa-check-circle'></i> OTP sent! Check your email inbox.";
    } else if (msg === "wrongotp") {
        el.style.display = "block";
        el.className = "msg-box msg-error";
        el.innerHTML = "<i class='fas fa-times-circle'></i> Incorrect OTP. Please try again.";
    } else if (msg === "expired") {
        el.style.display = "block";
        el.className = "msg-box msg-error";
        el.innerHTML = "<i class='fas fa-clock'></i> OTP expired. Please request a new one.";
    }

    // Auto move to next box
    const inputs = document.querySelectorAll('.otp-input');
    inputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
            updateHiddenOtp();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && input.value === '' && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    function updateHiddenOtp() {
        let otp = '';
        inputs.forEach(i => otp += i.value);
        document.getElementById('otpHidden').value = otp;
    }

    document.getElementById('otpForm').addEventListener('submit', function(e) {
        updateHiddenOtp();
        const otp = document.getElementById('otpHidden').value;
        if (otp.length !== 6) {
            e.preventDefault();
            alert('Please enter all 6 digits of the OTP.');
        }
    });
</script>
</body>
</html>
