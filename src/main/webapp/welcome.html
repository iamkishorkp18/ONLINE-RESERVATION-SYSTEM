<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KP Travels</title>
    <link rel="stylesheet" href="welcome.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="splash-screen">

        <!-- Animated particles background -->
        <div class="particles">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

        <!-- Main content -->
        <div class="splash-content">
            <div class="logo-icon">
                <i class="fas fa-paper-plane"></i>
            </div>
            <h1 class="animated-title">KP <span>TRAVELS</span></h1>
            <p class="tagline">Explore More. Worry Less.</p>
            <div class="loader-bar"><div class="loader-fill"></div></div>
        </div>

    </div>

    <script>
        setTimeout(function() {
            document.querySelector('.splash-screen').style.opacity = '0';
            document.querySelector('.splash-screen').style.transition = 'opacity 0.6s ease';
            setTimeout(function() {
                window.location.href = "index.html";
            }, 600);
        }, 3800);
    </script>

</body>
</html>
